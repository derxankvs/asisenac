<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - A.S.I</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>A.S.I</h1>
    <p>Acesso ao sistema</p>
    <form id="loginForm">
      <label>E-mail:</label>
      <input type="email" id="email" placeholder="exemplo@dominio.com" required>

      <label>Senha:</label>
      <input type="password" id="senha" required maxlength="20">

      <button type="submit">Entrar</button>
      <p>Não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
    </form>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      // Aqui ele ignora validações com servidor e entra direto
      alert("✅ Login liberado. Redirecionando...");
      window.location.href = "admin.html";
    });
  </script>
</body>
</html>
